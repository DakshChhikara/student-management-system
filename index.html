<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Student Management System</title>
</head>
<body>
    
    <div class="container">

        <section id="left-panel">

            <div class="books-image">
                <img src="books.png" alt="books">
            </div>

            <div class="student-heading" id="heading1">
                <span style="color: #4338CA;">Student  </span> Management   System
            </div>

            <div class="tagline">
                <p id="tagline">Manage student records  securely <br> and efficiently.</p>
            </div>


        </section>

        <section class="right-panel">

            <div class="login-card">


                <header class="card-header">
                    <img src="heyy.png" alt="">
                    <h1>Welcome Back</h1>
                    <p>Sign in to your account to continue</p>
                </header>

                <div class="form">
                    <label for="email">Email address</label> 
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                    <label for="pass">Password</label>
                    <input type="password" id="pass" name="pass" placeholder="Enter your password" required>
                </div>

                <div class="options">

                    <div class="remember">
                        <input type="checkbox" id="remember">
                        <label for="remember">Remember me</label>
                    </div>

                    <a href="#" class="forgot-password">Forgot Password?</a>

                </div>

                <button id="sign-in">Sign In</button>

                <div class="divide">
                    ──────── &nbsp or continue with &nbsp ────────
                </div>

                <div class="other-signin">

                    <button class="social-button">
                        <img src="google.png" alt="Google">
                        <span>Google</span>
                    </button>

                    <button class="social-button">
                        <img src="image.png" alt="Microsoft"> &nbsp;
                        <span>Microsoft</span>
                    </button>

                </div>

            </div>

            <footer>
                <p>© 2026 Student Management System. All rights reserved.</p>
            </footer>

        </section>

    </div>

</body>
</html>
